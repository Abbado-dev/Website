<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect x="5" y="5" width="190" height="190" rx="32" fill="#0a1628"/>

  <!-- Baton — white, tapered, slight curve -->
  <path d="M38 162 Q70 110 118 52" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Baton tip — thinner -->
  <path d="M118 52 Q124 44 128 38" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Concentric arcs from baton tip area -->
  <!-- Arc 1 — innermost, bright blue -->
  <path d="M108 58 Q126 72 132 96" stroke="#3b82f6" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Arc 2 — medium -->
  <path d="M100 44 Q132 62 144 104" stroke="#64748b" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Arc 3 — outer, lighter -->
  <path d="M92 32 Q138 52 156 110" stroke="#94a3b8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Arc 4 — outermost, subtle -->
  <path d="M86 22 Q144 42 166 116" stroke="#64748b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Code brackets {} on left of arcs -->
  <text x="82" y="60" fill="#94a3b8" font-family="monospace" font-size="12" opacity="0.7">{}</text>
  <text x="72" y="78" fill="#94a3b8" font-family="monospace" font-size="11" opacity="0.5">{}</text>

  <!-- Git branch icon — dots connected -->
  <circle cx="152" cy="72" r="3" fill="#93c5fd" opacity="0.7"/>
  <circle cx="160" cy="60" r="3" fill="#93c5fd" opacity="0.7"/>
  <circle cx="162" cy="80" r="2.5" fill="#93c5fd" opacity="0.5"/>
  <line x1="152" y1="72" x2="160" y2="60" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
  <line x1="152" y1="72" x2="162" y2="80" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>

  <!-- Terminal icon >_ -->
  <text x="132" y="126" fill="#93c5fd" font-family="monospace" font-size="13" opacity="0.6">&gt;_</text>

  <!-- Treble clef hint — bottom right -->
  <text x="156" y="138" fill="#64748b" font-family="serif" font-size="18" font-style="italic" opacity="0.4">𝄞</text>
</svg>
